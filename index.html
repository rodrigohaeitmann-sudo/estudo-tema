<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="TEMa Estudo">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="icon" type="image/png" href="icons/icon-192.png">
  <title>TEMa Estudo — Mastologia</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main>
    <!-- Tela: Início -->
    <section id="screen-home" class="screen active">
      <header class="app-header">
        <h1>TEMa Estudo</h1>
        <span id="sync-indicator" class="sync-indicator" title="Estado da sincronização">●</span>
      </header>
      <div id="home-alert" class="alert hidden"></div>
      <div class="cards-row">
        <div class="card">
          <span class="card-number" id="due-count">–</span>
          <span class="card-label">para revisar</span>
        </div>
        <div class="card">
          <span class="card-number" id="new-count">–</span>
          <span class="card-label">novas hoje</span>
        </div>
      </div>
      <div class="card card-wide">
        <div class="mini-stat"><span id="home-total">–</span> questões respondidas</div>
        <div class="mini-stat">acurácia geral: <span id="home-accuracy">–</span></div>
      </div>
      <button id="btn-start" class="btn-primary">Estudar</button>
      <p id="home-sync-text" class="muted"></p>
    </section>

    <!-- Tela: Estudo -->
    <section id="screen-study" class="screen">
      <div id="study-container">
        <p class="muted">Nenhuma sessão ativa. Volte ao Início e toque em "Estudar".</p>
      </div>
    </section>

    <!-- Tela: Estatísticas -->
    <section id="screen-stats" class="screen">
      <header class="app-header"><h1>Estatísticas</h1></header>
      <div id="stats-container"></div>
    </section>

    <!-- Tela: Configurações -->
    <section id="screen-config" class="screen">
      <header class="app-header"><h1>Configurações</h1></header>
      <label class="field">
        <span>URL do Apps Script (termina em /exec)</span>
        <input type="url" id="cfg-url" placeholder="https://script.google.com/macros/s/.../exec" autocomplete="off">
      </label>
      <label class="field">
        <span>Token de acesso</span>
        <input type="password" id="cfg-token" placeholder="token definido no Apps Script" autocomplete="off">
      </label>
      <label class="field">
        <span>Questões novas por dia</span>
        <input type="number" id="cfg-new-per-day" min="0" max="200" value="15">
      </label>
      <button id="btn-save-config" class="btn-primary">Salvar</button>
      <button id="btn-test-connection" class="btn-secondary">Testar conexão</button>
      <button id="btn-sync-now" class="btn-secondary">Sincronizar agora</button>
      <button id="btn-clear-local" class="btn-danger">Apagar dados locais</button>
      <p id="config-status" class="muted"></p>
    </section>
  </main>

  <nav id="bottom-nav">
    <button data-screen="home" class="active"><span class="nav-icon">🏠</span>Início</button>
    <button data-screen="study"><span class="nav-icon">📚</span>Estudo</button>
    <button data-screen="stats"><span class="nav-icon">📊</span>Stats</button>
    <button data-screen="config"><span class="nav-icon">⚙️</span>Ajustes</button>
  </nav>

  <script type="module" src="js/app.js"></script>
</body>
</html>
